<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pratul Ramesh — Motorsports & Marketing</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet"/>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      font-family: 'Inter', sans-serif;
      color: white;
    }

    nav {
      display: flex;
      justify-content: space-between;
      padding: 20px 40px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .nav-links { display: flex; gap: 24px; }

    .nav-links a {
      color: rgba(255,255,255,0.6);
      text-decoration: none;
    }

    .nav-links a:hover { color: white; }

    /* BUTTON FIX */
    .btn {
      text-decoration: none;
      padding: 10px 16px;
      background: #2563eb;
      border-radius: 8px;
      color: white;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn:hover { background: #1d4ed8; }

    .hero {
      display: grid;
      grid-template-columns: 1fr 1fr;
      padding: 60px 40px;
      max-width: 1200px;
      margin: auto;
      align-items: center;
    }

    h1 {
      font-size: 64px;
      margin-bottom: 20px;
    }

    .hero p {
      color: rgba(255,255,255,0.6);
      margin-bottom: 24px;
      max-width: 400px;
    }

    .hero-buttons {
      display: flex;
      gap: 12px;
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.1);
    }

    /* IMAGE FIX */
    .profile {
      display: flex;
      justify-content: center;
    }

    .profile img {
      width: 300px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.1);
      object-fit: cover;
    }

    @media (max-width: 900px) {
      .hero {
        grid-template-columns: 1fr;
        text-align: center;
      }

      .profile {
        margin-top: 40px;
      }
    }
  </style>
</head>

<body>

  <nav>
    <div>PR.</div>

    <div class="nav-links">
      <a href="#about">About</a>
      <a href="#experience">Experience</a>
      <a href="#contact">Contact</a>
    </div>

    <!-- LINK FIXED -->
    <a href="https://www.linkedin.com/in/pratul-ramesh-f1/" target="_blank" class="btn">
      in Connect
    </a>
  </nav>

  <section class="hero">

    <!-- LEFT -->
    <div>
      <h1>From pit lane<br>to boardroom.</h1>

      <p>
        I am Pratul Ramesh — working across motorsport and marketing,
        from Aston Martin F1 to brand strategy.
      </p>

      <div class="hero-buttons">
        <a href="#experience" class="btn">View My Journey</a>

        <!-- LINK FIXED -->
        <a href="https://www.linkedin.com/in/pratul-ramesh-f1/" target="_blank" class="btn btn-secondary">
          LinkedIn
        </a>
      </div>
    </div>

    <!-- RIGHT IMAGE -->
    <div class="profile">
      <!-- IMAGE FIX: MAKE SURE FILE NAME MATCHES -->
      <img src="profile.jpg" alt="Pratul Ramesh">
    </div>

  </section>

</body>
</html>
