<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Pratul Ramesh — Motorsport & Marketing portfolio. Experience with Aston Martin F1, Mahindra Group, and Oxford Brookes Racing." />
  <title>Pratul Ramesh — Motorsports & Marketing</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: #0a0a0a;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 48px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .nav-logo { font-weight: 800; font-size: 20px; }

    .nav-links { display: flex; gap: 32px; }

    .nav-links a {
      color: rgba(255,255,255,0.55);
      font-size: 14px;
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: #fff; }

    /* BUTTONS */
    a.btn-connect, a.btn-primary, a.btn-secondary {
      text-decoration: none;
      cursor: pointer;
    }

    a.btn-connect {
      background: #2563eb;
      color: #fff;
      border-radius: 8px;
      padding: 8px 18px;
      font-size: 14px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s;
    }
    a.btn-connect:hover { background: #1d4ed8; }

    .li-badge {
      font-size: 11px;
      font-weight: 800;
      background: rgba(255,255,255,0.2);
      border-radius: 3px;
      padding: 1px 4px;
    }

    .hero {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      padding: 56px 48px 64px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .hero-left {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-right: 48px;
    }

    h1 {
      font-size: 72px;
      font-weight: 900;
      line-height: 1.0;
      letter-spacing: -3px;
      margin-bottom: 24px;
    }

    h1 em { font-style: italic; }

    .hero-body {
      color: rgba(255,255,255,0.55);
      font-size: 15px;
      line-height: 1.7;
      margin-bottom: 36px;
      max-width: 380px;
    }

    .hero-ctas { display: flex; gap: 12px; }

    .btn-primary {
      background: #2563eb;
      color: #fff;
      border-radius: 100px;
      padding: 14px 28px;
      font-weight: 700;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: #1d4ed8; }

    .btn-secondary {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 100px;
      padding: 14px 24px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: 0.2s;
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.2);
    }

    .li-icon {
      background: #0077b5;
      border-radius: 4px;
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 800;
    }

    <div class="hero-right" id="skills">

  <!-- PROFILE IMAGE -->
  <div class="profile-image">
    <img src="your-image.jpg" alt="Pratul Ramesh">
  </div>
    
    .hero-right {
      padding-left: 48px;
      border-left: 1px solid rgba(255,255,255,0.07);
    }

    .section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 96px 48px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    /* Accessibility (hidden gem) */
    a:focus {
      outline: 2px solid #2563eb;
      outline-offset: 2px;
    }

    @media (max-width: 900px) {
      nav { padding: 16px 24px; }
      .nav-links { display: none; }
      .hero { grid-template-columns: 1fr; padding: 40px 24px; }
      h1 { font-size: 48px; }
      .hero-right {
        border-left: none;
        border-top: 1px solid rgba(255,255,255,0.07);
        padding-top: 40px;
        padding-left: 0;
      }
    }
  </style>
</head>

<body>

  <nav>
    <span class="nav-logo">PR.</span>

    <div class="nav-links">
      <a href="#about">About</a>
      <a href="#experience">Experience</a>
      <a href="#skills">Skills</a>
      <a href="#highlights">Highlights</a>
      <a href="#contact">Contact</a>
    </div>

    <a href="https://www.linkedin.com/in/pratul-ramesh-f1/" target="_blank" rel="noopener noreferrer" class="btn-connect">
      <span class="li-badge">in</span> Connect
    </a>
  </nav>

  <main class="hero">

    <div class="hero-left">
      <h1>From pit lane<br>to <em>boardroom.</em></h1>

      <p class="hero-body">
        I am Pratul Ramesh — three seasons at Aston Martin F1, Mahindra Group branding,
        and Oxford Brookes Racing.
      </p>

      <div class="hero-ctas">
        <a href="#experience" class="btn-primary">View My Journey</a>

        <a href="https://www.linkedin.com/in/pratul-ramesh-f1/" target="_blank" rel="noopener noreferrer" class="btn-secondary">
          <span class="li-icon">in</span> LinkedIn
        </a>
      </div>
    </div>

  </main>

</body>
</html>
